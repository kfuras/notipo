services:
  app:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspace:cached
    command: sleep infinity
    env_file:
      - .env
    environment:
      # Override host-based URLs to use Docker service names
      DATABASE_URL: postgresql://pressflow:localdev@postgres:5432/pressflow
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
