app = 'notipo-prod-web'
primary_region = 'ams'

[build]
  dockerfile = 'apps/web/Dockerfile'

[env]
  API_INTERNAL_URL = 'http://notipo-prod-api.flycast'
  SITE_INTERNAL_URL = 'http://notipo-prod-site.flycast'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
