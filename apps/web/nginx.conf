server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Strip trailing slashes (Next.js static export has no index.html in subdirs)
    # Use absolute_redirect off so nginx emits a relative 301 (works behind TLS proxy)
    absolute_redirect off;
    rewrite ^(.+)/$ $1 permanent;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
