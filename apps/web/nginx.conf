server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Change async scripts to defer so they execute after HTML is fully parsed.
    # Prevents React hydration mismatch when JS executes before DOM is complete.
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'async=""' 'defer=""';

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
