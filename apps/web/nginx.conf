server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Strip data-precedence from CSS links so React 19 doesn't manage them.
    # When hydration fails, React's recovery render can drop managed stylesheets.
    # Without data-precedence, the browser keeps CSS loaded regardless of React.
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter 'data-precedence="next"' '';

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
