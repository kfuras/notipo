server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Content-Security-Policy "frame-ancestors 'none'" always;

    # Strip trailing slashes (Next.js static export has no index.html in subdirs)
    # Use absolute_redirect off so nginx emits a relative 301 (works behind TLS proxy)
    absolute_redirect off;
    rewrite ^(.+)/$ $1 permanent;

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # PostHog reverse proxy (avoids ad blockers and Safari ITP)
    location /ingest/static/ {
        proxy_pass https://eu-assets.i.posthog.com/static/;
        proxy_set_header Host eu-assets.i.posthog.com;
        proxy_ssl_server_name on;
    }

    location /ingest/ {
        proxy_pass https://eu.i.posthog.com/;
        proxy_set_header Host eu.i.posthog.com;
        proxy_ssl_server_name on;
    }

    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
