name: blog-compiler-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-compiler-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: blogcompiler
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: blogcompiler
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blogcompiler"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    profiles: ["full"]
    build:
      context: .
      target: production
    container_name: blog-compiler-dev-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://blogcompiler:localdev@postgres:5432/blogcompiler
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
