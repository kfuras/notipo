# Dev deployment with Traefik + Cloudflare Tunnel (no static IP needed).
# Usage:
#   1. Copy apps/api/.env.example to .env and fill in all values
#   2. Set CF_TUNNEL_TOKEN in .env (from Cloudflare Zero Trust dashboard)
#   3. docker compose -f docker-compose.dev.yml up -d

name: notipo-dev

services:
  cloudflared:
    container_name: notipo-cloudflared
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate --protocol http2 run --token ${CF_TUNNEL_TOKEN}

  traefik:
    container_name: notipo-traefik
    image: traefik:v3.6.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --accesslog=true
      - --log.level=DEBUG
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  app:
    container_name: notipo-app
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://notipo:${DB_PASSWORD}@postgres:5432/notipo
    env_file: .env
    command: ["sh", "-c", "npx prisma migrate deploy && npx prisma db seed && node dist/index.js"]
    volumes:
      - uploads:/app/apps/api/uploads
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || Path(`/health`))
      - traefik.http.routers.app.entrypoints=web
      - traefik.http.routers.app.priority=20
      - traefik.http.services.app.loadbalancer.server.port=3000

  web:
    container_name: notipo-web
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_PLAUSIBLE_SRC: ${NEXT_PUBLIC_PLAUSIBLE_SRC:-}
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.web.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.web.entrypoints=web
      - traefik.http.routers.web.priority=10
      - traefik.http.services.web.loadbalancer.server.port=80

  postgres:
    container_name: notipo-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: notipo
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: notipo
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notipo"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  uploads:
