app = 'notipo-staging-api'
primary_region = 'ams'

[build]
  dockerfile = 'apps/api/Dockerfile'

[deploy]
  release_command = 'npx prisma migrate deploy'

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[mounts]
  source = 'uploads'
  destination = '/app/apps/api/uploads'
