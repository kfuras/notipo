app = 'notipo-staging-web'
primary_region = 'ams'

[build]
  dockerfile = 'apps/web/Dockerfile'

[env]
  API_INTERNAL_URL = 'http://notipo-staging-api.internal:3000'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
