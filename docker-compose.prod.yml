# Production deployment with Traefik reverse proxy + Let's Encrypt TLS.
# Usage:
#   1. Copy .env.example to .env and fill in all values
#   2. docker compose -f docker-compose.prod.yml up -d

name: pressflow

services:
  traefik:
    container_name: pressflow-traefik
    image: traefik:v3.6.2
    restart: unless-stopped
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all HTTP → HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt via HTTP challenge
      - --certificatesresolvers.letsencrypt.acme.httpchallenge=true
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt

  app:
    container_name: pressflow-app
    build:
      context: .
      target: production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Override DATABASE_URL to use the postgres container hostname
      DATABASE_URL: postgresql://pressflow:${DB_PASSWORD}@postgres:5432/pressflow
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`${DOMAIN}`) && (PathPrefix(`/api`) || PathPrefix(`/admin`) || Path(`/health`))
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls=true
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.routers.app.priority=20
      - traefik.http.services.app.loadbalancer.server.port=3000

  landing:
    container_name: pressflow-landing
    build:
      context: ../pressflow-landing
    restart: unless-stopped
    labels:
      - traefik.enable=true
      - traefik.http.routers.landing.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.landing.entrypoints=websecure
      - traefik.http.routers.landing.tls=true
      - traefik.http.routers.landing.tls.certresolver=letsencrypt
      - traefik.http.routers.landing.priority=10
      - traefik.http.services.landing.loadbalancer.server.port=80

  postgres:
    container_name: pressflow-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: pressflow
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: pressflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Not exposed externally — only reachable by the app container
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pressflow"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  letsencrypt:
  pgdata:
